services:
  visio:
    image: node:20-alpine
    container_name: visio-app
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3010:3000"
    environment:
      - PORT=3000
    command: sh -c "npm install && npm run build && npm start"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
