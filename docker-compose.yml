services:
  visio:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: visio

    ports:
      - "${APP_PORT}:3000"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s